name: ARCH Review

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build ARCH CLI
        run: |
          cd cli
          npm install
          npm run build

      - name: Run arch review
        id: review
        run: |
          node cli/dist/index.js review
