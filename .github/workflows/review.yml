name: ARCH Review

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build ARCH CLI
        run: |
          cd cli
          npm install
          npm run build

      - name: Run arch review
        id: review
        run: |
          ./scripts/arch.sh review > review_output.txt 2>&1

      - name: Report Failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('review_output.txt', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ARCH Review Failed\n\`\`\`\n${output}\n\`\`\``
            })

      - name: Push bug task if on main
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # TASK-087 commits the bug task, we just need to push
          git push origin main || echo "Nothing to push or push failed"
