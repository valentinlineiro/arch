name: action:test
on:
  workflow_call:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: |
          cd cli
          npm install
          npm test
      # minimum floor — raise after baseline is established from TASK-1040
      - run: |
          cd cli
          npm run test:coverage
