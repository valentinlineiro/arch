<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARCH Viewer — Task Explorer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --surface2: #161616;
      --border: #222;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #7fff7f;
      --accent-dim: #3a6b3a;
      --blue: #7fb3ff;
      --yellow: #ffdf7f;
      --red: #ff7f7f;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo { font-family: var(--font-mono); font-size: 1rem; font-weight: 700; color: var(--accent); text-decoration: none; }
    .nav-links { display: flex; gap: 1.5rem; }
    .nav-link { color: var(--muted); text-decoration: none; font-size: 0.875rem; }
    .nav-link:hover { color: var(--text); }

    main {
      flex: 1;
      max-width: 1000px;
      width: 100%;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    .page-label {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      max-width: 600px;
    }

    .error-banner {
      background: rgba(255, 127, 127, 0.1);
      border: 1px solid var(--red);
      color: var(--red);
      padding: 1rem;
      border-radius: 4px;
      margin-bottom: 2rem;
      display: none;
      font-size: 0.9rem;
    }

    .section-title {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .task-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s;
    }
    .task-card:hover { border-color: var(--muted); }

    .task-meta {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.75rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
    }
    .badge {
      padding: 0.1rem 0.4rem;
      border-radius: 2px;
      background: var(--surface2);
      color: var(--muted);
    }
    .badge.p0 { color: var(--red); border: 1px solid var(--red); background: transparent; }
    .badge.p1 { color: var(--yellow); }
    .badge.ready { color: var(--accent); }
    .badge.in-progress { color: var(--blue); }

    .task-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      flex: 1;
    }

    .task-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.75rem;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    .drift-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      font-family: var(--font-mono);
    }
    .drift-item {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
    }
    .drift-status { width: 1.5rem; text-align: center; }
    .drift-check { color: var(--muted); width: 100px; }
    .drift-details { color: var(--text); flex: 1; }

    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-family: var(--font-mono);
    }

    footer {
      padding: 3rem 2rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.75rem;
      text-align: center;
    }

    @media (max-width: 600px) {
      .task-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">ARCH</a>
    <div class="nav-links">
      <a href="arch-initializr.html" class="nav-link">Initializr</a>
      <a href="https://github.com/valentinlineiro/arch" class="nav-link">GitHub</a>
    </div>
  </nav>

  <main id="app">
    <div class="page-label">SYSTEM_VIEWER</div>
    <h1>Project State</h1>
    <p class="subtitle">Real-time view of active tasks and system integrity metrics fetched directly from GitHub.</p>

    <div id="error-banner" class="error-banner"></div>

    <div id="content">
      <div class="loading">Fetching data from GitHub API...</div>
    </div>
  </main>

  <footer>
    &copy; 2026 ARCH Framework — Anonymous Read Access via GitHub API
  </footer>

  <script>
    const OWNER = 'valentinlineiro';
    const REPO = 'arch';
    const BRANCH = 'main';

    async function fetchTasks() {
      try {
        const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/docs/tasks?ref=${BRANCH}`);
        if (!response.ok) {
          if (response.status === 403) throw new Error('GitHub API rate limit exceeded. Please try again later.');
          throw new Error('Failed to fetch tasks from GitHub.');
        }
        const files = await response.json();
        const taskFiles = files.filter(f => f.name.endsWith('.md') && f.name.startsWith('TASK-'));
        
        const tasks = await Promise.all(taskFiles.map(async file => {
          const res = await fetch(file.download_url);
          const content = await res.text();
          return parseTask(file.name, content);
        }));

        return tasks;
      } catch (err) {
        showError(err.message);
        return [];
      }
    }

    function parseTask(filename, content) {
      const idMatch = filename.match(/(TASK-\d{3})/);
      const titleMatch = content.match(/^## TASK-\d{3}: (.*)/m);
      const metaMatch = content.match(/^\*\*Meta:\*\* (.*)/m);

      if (!idMatch) return null;

      const id = idMatch[1];
      const title = titleMatch ? titleMatch[1] : 'Untitled Task';
      const metaLine = metaMatch ? metaMatch[1] : '';
      const parts = metaLine.split('|').map(p => p.trim());

      // P1 | XS | READY | Focus:yes | 6-writing | claude | docs/
      return {
        id,
        title,
        priority: parts[0] || 'P2',
        size: parts[1] || 'S',
        status: parts[2] || 'IDEA',
        focus: parts[3] || 'Focus:no',
        class: parts[4] || '',
        cli: parts[5] || '',
        context: parts[6] || ''
      };
    }

    function showError(msg) {
      const banner = document.getElementById('error-banner');
      banner.textContent = msg;
      banner.style.display = 'block';
    }

    function renderTasks(tasks) {
      const activeTasks = tasks.filter(t => t && t.focus === 'Focus:yes');
      const queuedTasks = tasks.filter(t => t && t.focus === 'Focus:no');

      let html = '';

      if (activeTasks.length > 0) {
        html += `<div class="section-title">Active Focus</div>`;
        html += `<div class="task-grid">`;
        activeTasks.forEach(t => html += renderTaskCard(t));
        html += `</div>`;
      }

      if (queuedTasks.length > 0) {
        html += `<div class="section-title">Backlog</div>`;
        html += `<div class="task-grid">`;
        queuedTasks.forEach(t => html += renderTaskCard(t));
        html += `</div>`;
      }

      // Placeholder for Drift section (since it requires running `arch review` which we can't do in browser)
      // We could fetch a static report if we had one, but for now we'll show a "Static Integrity" check
      html += `<div class="section-title">System Integrity</div>`;
      html += `
        <div class="drift-section">
          <div class="drift-item">
            <span class="drift-status" style="color: var(--accent)">✔</span>
            <span class="drift-check">API</span>
            <span class="drift-details">Connected to GitHub v3</span>
          </div>
          <div class="drift-item">
            <span class="drift-status" style="color: var(--accent)">✔</span>
            <span class="drift-check">Structure</span>
            <span class="drift-details">Flat docs/tasks/ detected</span>
          </div>
          <div class="drift-item">
            <span class="drift-status" style="color: var(--muted)">-</span>
            <span class="drift-check">Drift</span>
            <span class="drift-details">Run 'arch review' locally for full drift report</span>
          </div>
        </div>
      `;

      document.getElementById('content').innerHTML = html;
    }

    function renderTaskCard(t) {
      const statusClass = t.status.toLowerCase().replace('_', '-');
      const priorityClass = t.priority.toLowerCase();
      
      return `
        <div class="task-card">
          <div class="task-meta">
            <span class="badge ${priorityClass}">${t.priority}</span>
            <span class="badge">${t.size}</span>
            <span class="badge ${statusClass}">${t.status}</span>
          </div>
          <div class="task-title">${t.title}</div>
          <div class="task-footer">
            <span>${t.id}</span>
            <span>${t.cli}</span>
          </div>
        </div>
      `;
    }

    async function init() {
      const tasks = await fetchTasks();
      if (tasks.length > 0) {
        renderTasks(tasks);
      } else {
        document.getElementById('content').innerHTML = '<div class="loading">No tasks found.</div>';
      }
    }

    init();
  </script>
</body>
</html>
